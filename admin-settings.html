<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Mieza Admin Settings</title>

<link rel="stylesheet" href="css/style.css">

<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f5f5;
  padding: 20px;
}

.settings-card {
  max-width: 650px;
  background: #fff;
  padding: 25px;
  border-radius: 14px;
  box-shadow: 0 2px 8px rgba(0,0,0,.1);
}

.input-group {
  margin-bottom: 18px;
}

.input-group label {
  display: block;
  font-weight: bold;
  margin-bottom: 7px;
}

.input-group input {
  width: 100%;
  padding: 12px;
  border: 1px solid #ddd;
  border-radius: 8px;
}

button {
  padding: 12px 18px;
  cursor: pointer;
}
</style>

 <link rel="icon" type="image/png" href="favicon.png">
</head>

<body>

<h1>Admin Settings</h1>

<a href="admin-dashboard.html">
← Back Dashboard
</a>

<br><br>

<div class="settings-card">

  <div class="input-group">
    <label>Vendor Commission Rate (%)</label>
    <input id="vendorCommissionRate" type="number">
  </div>

  <div class="input-group">
    <label>Rider/Driver Commission Rate (%)</label>
    <input id="riderCommissionRate" type="number">
  </div>

  <div class="input-group">
    <label>Support Email</label>
    <input id="supportEmail" type="email">
  </div>

  <div class="input-group">
    <label>Support Phone 1</label>
    <input id="supportPhone1" type="text">
  </div>

  <div class="input-group">
    <label>Support Phone 2</label>
    <input id="supportPhone2" type="text">
  </div>
  <div class="input-group">
    <label>Support Phone 3</label>
    <input id="supportPhone3" type="text">
  </div>
  <div class="input-group">
    <label>Support Phone 4</label>
    <input id="supportPhone4" type="text">
  </div>

  <div class="input-group">
    <label>Business Location</label>
    <input id="businessLocation" type="text">
  </div>

  <div class="input-group">
    <label>Working Hours</label>
    <input id="workingHours" type="text">
  </div>

  <button onclick="saveSettings()">
    Save Settings
  </button>

</div>

<script src="js/admin-settings.js"></script>

</body>
</html>
