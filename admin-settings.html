<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Mieza Admin Settings</title>

<link rel="stylesheet" href="css/style.css">

<style>

:root{
  --primary:#0b5cff;
  --primary-dark:#0849c6;
  --accent:#22c55e;
  --bg:#f5f7fb;
  --card:#ffffff;
  --text:#1f2937;
  --muted:#6b7280;
  --border:#e5e7eb;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Inter,Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  padding:40px 20px;
}

.page-header{
  max-width:1100px;
  margin:auto;
  margin-bottom:30px;
}

.page-header h1{
  font-size:42px;
  font-weight:800;
  margin-bottom:10px;
}

.back-link{
  display:inline-flex;
  align-items:center;
  gap:8px;
  color:var(--primary);
  font-weight:600;
  text-decoration:none;
}

.back-link:hover{
  text-decoration:underline;
}

.settings-card{

  max-width:1100px;
  margin:auto;

  background:var(--card);

  border-radius:24px;

  padding:35px;

  box-shadow:
  0 10px 40px rgba(0,0,0,.08);

}

.settings-section{

  margin-bottom:40px;

}

.section-title{

  font-size:22px;
  font-weight:700;

  margin-bottom:20px;

  padding-bottom:12px;

  border-bottom:
  1px solid var(--border);

}

.settings-grid{

  display:grid;

  grid-template-columns:
  repeat(auto-fit,minmax(280px,1fr));

  gap:20px;

}

.input-group{

  display:flex;

  flex-direction:column;

}

.input-group label{

  font-weight:600;

  margin-bottom:8px;

  color:var(--text);

}

.input-group input,
.input-group select{

  width:100%;

  height:54px;

  padding:0 16px;

  border:1px solid var(--border);

  border-radius:14px;

  background:#fff;

  font-size:15px;

  transition:.25s;

}

.input-group input:focus,
.input-group select:focus{

  outline:none;

  border-color:var(--primary);

  box-shadow:
  0 0 0 4px rgba(11,92,255,.12);

}

.save-btn{

  border:none;

  background:
  linear-gradient(
  135deg,
  var(--primary),
  var(--primary-dark)
  );

  color:white;

  padding:15px 30px;

  border-radius:14px;

  font-size:16px;

  font-weight:700;

  cursor:pointer;

  transition:.3s;

}

.save-btn:hover{

  transform:
  translateY(-2px);

  box-shadow:
  0 10px 25px rgba(11,92,255,.25);

}

.settings-highlight{

  display:grid;

  grid-template-columns:
  repeat(auto-fit,minmax(220px,1fr));

  gap:16px;

  margin-bottom:35px;

}

.highlight-card{

  background:
  linear-gradient(
  135deg,
  #0b5cff,
  #3b82f6
  );

  color:white;

  padding:20px;

  border-radius:18px;

}

.highlight-card h4{

  font-size:14px;

  opacity:.9;

  margin-bottom:8px;

}

.highlight-card p{

  font-size:26px;

  font-weight:800;

}

@media(max-width:768px){

.page-header h1{

font-size:32px;

}

.settings-card{

padding:20px;

}

.settings-grid{

grid-template-columns:1fr;

}

}

</style>

 <link rel="icon" type="image/png" href="favicon.png">

 <meta
  http-equiv="Cache-Control"
  content="no-store, no-cache, must-revalidate, max-age=0"
>

<meta
  http-equiv="Pragma"
  content="no-cache"
>

<meta
  http-equiv="Expires"
  content="0"
>
</head>

<body>

<div class="page-header">

  <h1>⚙️ Admin Settings</h1>

  <a
    href="admin-dashboard.html"
    class="back-link"
  >
    ← Back Dashboard
  </a>

</div>

<div class="settings-card">

  <div class="settings-section">
    <h2 class="section-title">Marketplace Settings</h2>

    <div class="settings-grid">

      <div class="input-group">
        <label>Vendor Commission Rate (%)</label>
        <input id="vendorCommissionRate" type="number">
      </div>

      <div class="input-group">
        <label>Rider/Driver Commission Rate (%)</label>
        <input id="riderCommissionRate" type="number">
      </div>

      <div class="input-group">
        <label>Shop Registration Fee (₵)</label>
        <input id="shopRegistrationFee" type="number">
      </div>

      <div class="input-group">
        <label>Rider Registration Fee (₵)</label>
        <input id="riderRegistrationFee" type="number">
      </div>

    </div>
  </div>

  <div class="settings-section">
    <h2 class="section-title">Registration Controls</h2>

    <div class="settings-grid">

      <div class="input-group">
        <label>Require Shop Registration Payment?</label>
        <select id="shopRegistrationPaymentRequired">
          <option value="true">Yes, require payment</option>
          <option value="false">No, free registration</option>
        </select>
      </div>

      <div class="input-group">
        <label>Require Rider Registration Payment?</label>
        <select id="riderRegistrationPaymentRequired">
          <option value="true">Yes, require payment</option>
          <option value="false">No, free registration</option>
        </select>
      </div>

    </div>
  </div>

  <div class="settings-section">
    <h2 class="section-title">Support Information</h2>

    <div class="settings-grid">

      <div class="input-group">
        <label>Support Email</label>
        <input id="supportEmail" type="email">
      </div>

      <div class="input-group">
        <label>Support Phone 1</label>
        <input id="supportPhone1" type="text">
      </div>

      <div class="input-group">
        <label>Support Phone 2</label>
        <input id="supportPhone2" type="text">
      </div>

      <div class="input-group">
        <label>Support Phone 3</label>
        <input id="supportPhone3" type="text">
      </div>

      <div class="input-group">
        <label>Support Phone 4</label>
        <input id="supportPhone4" type="text">
      </div>

      <div class="input-group">
        <label>Support Phone 5</label>
        <input id="supportPhone5" type="text">
      </div>

      <div class="input-group">
        <label>Business Location</label>
        <input id="businessLocation" type="text">
      </div>

      <div class="input-group">
        <label>Working Hours</label>
        <input id="workingHours" type="text">
      </div>

    </div>
  </div>

  <div class="settings-section">
  <h2 class="section-title">Automatic Settlement Settings</h2>

  <div class="settings-grid">

    <div class="input-group">
      <label>Enable Automatic Payouts?</label>
      <select id="autoPayoutEnabled">
        <option value="true">Yes, enable auto payouts</option>
        <option value="false">No, manual payouts only</option>
      </select>
    </div>

    <div class="input-group">
      <label>Settlement Frequency</label>
      <select id="settlementFrequency">
        <option value="daily">Daily</option>
        <option value="weekly">Weekly</option>
        <option value="monthly">Monthly</option>
      </select>
    </div>

    <div class="input-group">
      <label>Settlement Hour</label>
      <input
        id="settlementHour"
        type="number"
        min="0"
        max="23"
        placeholder="22 means 10 PM"
      >
    </div>

    <div class="input-group">
      <label>Minimum Settlement Amount (₵)</label>
      <input
        id="minimumSettlementAmount"
        type="number"
        placeholder="50"
      >
    </div>

    <div class="input-group">
      <label>Retry Failed Settlements?</label>
      <select id="retryFailedSettlements">
        <option value="true">Yes, retry failed payouts</option>
        <option value="false">No, do not retry</option>
      </select>
    </div>

  </div>
</div>

  <div class="settings-section">
  <h2 class="section-title">Terms & Conditions</h2>

  <div class="input-group">
    <label>Vendor & Rider Registration Terms</label>

    <textarea
      id="termsAndConditions"
      rows="8"
      style="
        width:100%;
        padding:16px;
        border:1px solid var(--border);
        border-radius:14px;
        font-size:15px;
        resize:vertical;
      "
      placeholder="Type your terms and conditions here..."
    ></textarea>
  </div>
</div>

  <button
    class="save-btn"
    onclick="saveSettings()"
  >
    Save Settings
  </button>

</div>

<script src="js/admin-access.js"></script>
<script src="js/admin-settings.js"></script>

</body>
</html>
