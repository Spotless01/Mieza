<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Admin Users — Mieza</title>

  <link
    rel="stylesheet"
    href="css/style.css"
  >

  <link
    rel="icon"
    type="image/png"
    href="favicon.png"
  >

  <meta
  http-equiv="Cache-Control"
  content="no-store, no-cache, must-revalidate, max-age=0"
>

<meta
  http-equiv="Pragma"
  content="no-cache"
>

<meta
  http-equiv="Expires"
  content="0"
>

</head>

<body class="admin-body">

<header class="admin-header">

  <div>
    <h1>Admin Users</h1>

    <p>
      Create and manage co-founder access.
    </p>
  </div>

  <div class="admin-actions">

    <a href="admin-dashboard.html">
      Back to Dashboard
    </a>

    <button onclick="logoutAdmin()">
      Logout
    </button>

  </div>

</header>

<main class="admin-main">

  <section class="admin-card">

    <h2>Create Co-founder Account</h2>

    <form id="adminUserForm">

      <input
        type="text"
        id="adminName"
        placeholder="Full name"
        required
      >

      <input
        type="email"
        id="adminEmail"
        placeholder="Email address"
        required
      >

      <input
        type="password"
        id="adminPassword"
        placeholder="Temporary password"
        minlength="8"
        required
      >

      <button type="submit">
        Create Co-founder Account
      </button>

    </form>

  </section>

  <section class="admin-card">

    <h2>Admin Accounts</h2>

    <div class="table-wrap">

      <table>

        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Role</th>
            <th>Status</th>
            <th>Last Login</th>
            <th>Action</th>
          </tr>
        </thead>

        <tbody id="adminUsersTable"></tbody>

      </table>

    </div>

  </section>

</main>

<script src="js/admin-access.js"></script>
<script src="js/admin-users.js"></script>

</body>
</html>
