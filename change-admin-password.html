<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Change Password — Mieza</title>

  <link
    rel="stylesheet"
    href="css/style.css"
  >

  <link
    rel="icon"
    type="image/png"
    href="favicon.png"
  >
</head>

<body class="admin-body">

  <main class="admin-main">

    <section
      class="admin-card"
      style="max-width:520px;margin:60px auto;"
    >

      <h1>Change Your Password</h1>

      <p>
        Your account was created with a temporary password.
        Create a new password before continuing to the dashboard.
      </p>

      <form id="changeAdminPasswordForm">

        <div class="input-group">

          <label for="currentPassword">
            Current password
          </label>

          <input
            type="password"
            id="currentPassword"
            autocomplete="current-password"
            required
          >

        </div>

        <div class="input-group">

          <label for="newPassword">
            New password
          </label>

          <input
            type="password"
            id="newPassword"
            minlength="8"
            autocomplete="new-password"
            required
          >

        </div>

        <div class="input-group">

          <label for="confirmPassword">
            Confirm new password
          </label>

          <input
            type="password"
            id="confirmPassword"
            minlength="8"
            autocomplete="new-password"
            required
          >

        </div>

        <button
          type="submit"
          id="changePasswordBtn"
        >
          Change Password
        </button>

      </form>

      <button
        type="button"
        onclick="logoutAdmin()"
        style="margin-top:14px;"
      >
        Logout
      </button>

    </section>

  </main>

  <script src="js/change-admin-password.js"></script>

</body>
</html>
