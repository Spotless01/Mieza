<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rider Registration - Mieza</title>
  <link rel="stylesheet" href="css/style.css">

   <link rel="icon" type="image/png" href="favicon.png">

   <script src="https://js.paystack.co/v1/inline.js"></script>
</head>
<body>

<div class="rider-login-page">

  <div class="rider-login-card">

    <div class="login-logo">
      <h1>Join Mieza Couriers</h1>
      <p>Register as a delivery rider or driver</p>
    </div>

    <div class="input-group">
      <label>Full Name</label>
      <input id="fullName" type="text" placeholder="Enter full name">
    </div>

    <div class="input-group">
      <label>Phone Number</label>
      <input id="phone" type="tel" placeholder="Enter phone number">
    </div>

    <div class="input-group">
      <label>Email</label>
      <input id="email" type="email" placeholder="Enter email">
    </div>

    <div class="input-group">
      <label>Password</label>
      <input id="password" type="password" placeholder="Create password">
    </div>

    <div class="input-group">
      <label>Vehicle Type</label>
      <select id="vehicleType">
        <option value="motorbike">Motorbike</option>
        <option value="car">Car</option>
        <option value="bicycle">Bicycle</option>
      </select>
    </div>

    <div class="input-group">
  <label for="payoutMethod">
    Payout Method
  </label>

  <select id="payoutMethod">
    <option value="momo">
      Mobile Money
    </option>

    <option value="bank">
      Bank Account
    </option>
  </select>
</div>

<!-- MOBILE MONEY FIELDS -->
<div id="momoFields">

  <div class="input-group">
    <label for="momoNumber">
      MoMo Number
    </label>

    <input
      id="momoNumber"
      type="tel"
      placeholder="MoMo number"
    >
  </div>

  <div class="input-group">
    <label for="momoName">
      MoMo Name
    </label>

    <input
      id="momoName"
      type="text"
      placeholder="Name on MoMo account"
    >
  </div>

  <div class="input-group">
    <label for="momoNetwork">
      MoMo Network
    </label>

    <select id="momoNetwork">
      <option value="">
        Select network
      </option>

      <option
        value="MTN"
        data-code="MTN"
      >
        MTN
      </option>

      <option
        value="Telecel"
        data-code="VOD"
      >
        Telecel
      </option>

      <option
        value="AirtelTigo"
        data-code="ATL"
      >
        AirtelTigo
      </option>
    </select>

    <input
      type="hidden"
      id="momoBankCode"
    >
  </div>

</div>

<!-- BANK FIELDS -->
<div
  id="bankFields"
  style="display:none;"
>

  <div class="input-group">
    <label for="bankName">
      Bank Name
    </label>

    <input
      id="bankName"
      type="text"
      placeholder="Bank name"
    >

    <input
      type="hidden"
      id="bankCode"
    >
  </div>

  <div class="input-group">
    <label for="accountName">
      Account Name
    </label>

    <input
      id="accountName"
      type="text"
      placeholder="Account name"
    >
  </div>

  <div class="input-group">
    <label for="accountNumber">
      Account Number
    </label>

    <input
      id="accountNumber"
      type="text"
      placeholder="Account number"
    >
  </div>

</div>

  <div class="terms-box">
  <label class="terms-label">
    <input type="checkbox" id="agreeTerms">

    <span>
      I have read and agree to the
      <a href="#" id="viewTerms">Terms & Conditions</a>
    </span>
  </label>
</div>

    <button class="login-btn" onclick="payAndRegisterRider()">
  Pay ₵100 & Register
</button>

    <p class="login-footer">
      Already registered?
      <a href="rider-login.html">Login here</a>
    </p>

  </div>

</div>

<div id="termsModal" class="terms-modal">
  <div class="terms-content">
    <div class="terms-header">
      <h2>Terms & Conditions</h2>

      <button id="closeTerms">
        ✕
      </button>
    </div>

    <div id="termsText" class="terms-body">
      Loading...
    </div>

    <button id="acceptTermsBtn" class="accept-terms-btn">
      I Understand
    </button>
  </div>
</div>

<script src="js/rider-register.js"></script>

</body>
</html>
