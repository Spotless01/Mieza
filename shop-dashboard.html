<!DOCTYPE html>
<html>
<head>
  <title>Dashboard — Mieza</title>
  <link rel="stylesheet" href="css/style.css">
   <link rel="stylesheet" href="css/dashboard.css" />
    <link rel="icon" type="image/png" href="favicon.png">
</head>
<body>

<header>

  <h1>Mieza Dashboard</h1>

  <div class="header-actions">

    <div class="notification-wrapper">

      <button
        id="notificationBtn"
        onclick="toggleNotifications()"
      >
        🔔
        <span id="notificationCount">
          0
        </span>
      </button>

      <div
        id="notificationDropdown"
        class="notification-dropdown"
      >
      </div>

    </div>

    <button onclick="logout()">
      Logout
    </button>

  </div>

</header>

<section class="dashboard">

  <h2>Welcome, <span id="shopName"></span></h2>

  <div class="earnings-dashboard">

  <div class="earning-card">
    <h4>Today's Sales</h4>
    <p id="todaySales">₵0</p>
  </div>

  <div class="earning-card">
    <h4>This Month</h4>
    <p id="monthSales">₵0</p>
  </div>

  <div class="earning-card">
    <h4>Pending Settlement</h4>
    <p id="pendingSettlement">₵0</p>
  </div>

  <div class="earning-card">
    <h4>Total Paid Out</h4>
    <p id="totalPaidOut">₵0</p>
  </div>

  <div class="earning-card">
    <h4>Mieza Commission</h4>
    <p id="totalCommission">₵0</p>
  </div>

</div>

  <!-- ADD PRODUCT -->
  <div class="add-product">
    <h3>Add Product</h3>

    <input id="productName" placeholder="Product name">
    <input id="productPrice" type="number" placeholder="Price">
    <textarea id="productDescription" placeholder="Description"></textarea>
    <input
  id="productImage"
  type="file"
  accept="image/*"
/>

    <button onclick="addProduct()">Upload Product</button>
  </div>

  <!-- PRODUCTS LIST -->
  <div class="products-list">
    <h3>Your Products</h3>
    <div id="products"></div>
  </div>

  <!-- ========================= -->
<!-- SHOP ORDERS -->
<!-- ========================= -->

<div class="orders-section">

  <h3>Customer Orders</h3>

  <a
    href="vendor-delivery.html"
    class="delivery-btn"
  >
    🚚 Open Delivery Tracking
  </a>

  <div id="ordersContainer"></div>

</div>

</section>

<script src="js/dashboard.js"></script>
</body>
</html>
