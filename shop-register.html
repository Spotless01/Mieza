<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register Your Shop — Mieza</title>

  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/shop-register.css" />

  <!-- Paystack -->
  <script src="https://js.paystack.co/v1/inline.js"></script>
   <link rel="icon" type="image/png" href="favicon.png">
</head>
<body>

<header class="auth-header">
  <h1 class="logo">Mieza</h1>

  <a href="index.html" class="back-link">
    ← Back to Marketplace
  </a>
</header>

<section class="register-section">
  <div class="register-card">
    <h2>Register Your Shop on Mieza</h2>
    <p class="intro">
      Join Ghana’s growing local marketplace.  
      Registration fee: <strong>₵200 (one-time)</strong>
    </p>

    <form id="shop-register-form">

      <input
        type="text"
        id="shopName"
        name="shopName"
        placeholder="Your Shop Name"
        required
      />

      <input
        type="text"
        id="ownerName"
        name="ownerName"
        placeholder="ShopOwner Full Name"
        required
      />

      <input
        type="email"
        id="email"
        name="email"
        placeholder="Your Email Address"
        required
      />

      <input
        type="tel"
        id="phone"
        name="phone"
        placeholder="Phone Number"
        required
      />

      <input
        type="password"
        id="password"
        name="password"
        placeholder="Create a strong Password"
        required
      />

      <input
  type="text"
  id="shopLocation"
  name="shopLocation"
  placeholder="Click the button below to capture your exact shop location"
  required
  readonly
>

      <button
        type="button"
        id="getShopLocation">
        📍 Use Exact Shop Location
      </button>

      <p
        id="locationStatus"
        style="font-size:14px;">
      </p>

      <input
        type="hidden"
        id="latitude"
        name="latitude"
      >

      <input
        type="hidden"
        id="longitude"
        name="longitude"
      >

      <h3>Payout Information</h3>

      <label>Payment Method</label> <select id="payoutMethod" required>

        <option value="momo">Mobile Money</option>
        <option value="bank">Bank Account</option>
      </select>

      <div id="momoFields">

      <input
      type="text"
      id="momoNumber"
      placeholder="MoMo Number"
      />

      <input
      type="text"
      id="momoName"
      placeholder="MoMo Account Name"
      />

        <select id="momoNetwork">
          <option value="">Select Network</option>
          <option value="MTN">MTN</option>
          <option value="Telecel">Telecel</option>
          <option value="AirtelTigo">AirtelTigo</option>
        </select>

      </div>

      <div id="bankFields" style="display:none;">

      <input
      type="text"
      id="bankName"
      placeholder="Bank Name"
      />

      <input
      type="text"
      id="accountName"
      placeholder="Account Name"
      />

      <input
      type="text"
      id="accountNumber"
      placeholder="Account Number"
      />

      </div>


      <button type="button" id="payAndRegisterBtn">
        Pay ₵200 & Register
      </button>

    </form>
  </div>
</section>

<script>

document
.getElementById("payoutMethod")
.addEventListener("change", function(){

  if(this.value === "momo"){

    document.getElementById(
      "momoFields"
    ).style.display = "block";

    document.getElementById(
      "bankFields"
    ).style.display = "none";

  } else {

    document.getElementById(
      "momoFields"
    ).style.display = "none";

    document.getElementById(
      "bankFields"
    ).style.display = "block";

  }

});

</script>


<script src="js/shop-register.js"></script>
</body>
</html>
