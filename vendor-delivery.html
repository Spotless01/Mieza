<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Delivery Tracking</title>

<link rel="stylesheet"
      href="css/style.css">

</head>
<body>

<div class="delivery-container">

  <h1>Delivery Tracking</h1>

  <input
    id="orderId"
    placeholder="Order ID"
  >

  <button id="startBtn">
    Start Delivery
  </button>

  <button id="stopBtn">
    Stop Delivery
  </button>

  <p id="status">
    Waiting...
  </p>

</div>

<script src="js/vendor-delivery.js"></script>

</body>
</html>
